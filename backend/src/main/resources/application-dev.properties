server.port=8080

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Liquibase - 개발 환경에서는 수동 실행
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Disable auto datasource config - we provide it via DataSourceConfig
spring.autoconfigure.exclude=

# Redis
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=5000

# JWT Secret
jwt.secret=${JWT_SECRET}

# CORS
cors.allowed-origins=http://localhost:3001
